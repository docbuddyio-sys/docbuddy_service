# --- RENDER PRODUCTION DATABASE ---
# Uses environment variables when deployed to Render
# Falls back to direct connection if env vars not set
spring.datasource.url = jdbc:postgresql://ep-solitary-hat-addsnolo-pooler.c-2.us-east-1.aws.neon.tech/neondb?user=neondb_owner&password=npg_BYuC3yO0pEzl&sslmode=require&channelBinding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_BYuC3yO0pEzl

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ============================================
# SERVER CONFIGURATION
# ============================================
# Render assigns PORT dynamically - CRITICAL for deployment
server.port=${PORT:8080}

# ============================================
# JWT CONFIGURATION
# ============================================
# Use environment variables in production
lifevault.app.jwtSecret=${JWT_SECRET:LifeVault@2025#@ditya1998}
lifevault.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# ============================================
# GOOGLE OAUTH CONFIGURATION
# ============================================
google.web-client-id=${GOOGLE_CLIENT_ID:846550826824-kb4qqtumi3h8kv317f240vs6m4l5ckct.apps.googleusercontent.com}


# ============================================
# ACTUATOR (Health Checks)
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=INFO
logging.level.com.example.lifevault=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

